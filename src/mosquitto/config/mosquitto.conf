# ============================================================================
# Mosquitto MQTT Broker Configuration
# ============================================================================
# Secure TLS configuration for real-time telemetry data streaming
# Used by IoT devices to publish sensor data and backend to subscribe

# ============================================================================
# Listener Configuration
# ============================================================================
# Port 8883 is the standard MQTT-over-TLS port (vs 1883 for plain MQTT)
listener 8883
protocol mqtt

# ============================================================================
# TLS/SSL Configuration
# ============================================================================
# Certificate Authority - verifies client and server certificates
cafile /mosquitto/config/certs/ca.crt

# Server certificate and private key for TLS handshake
certfile /mosquitto/config/certs/server.crt
keyfile /mosquitto/config/certs/server.key

# Client certificate requirements
# Set to false for easier device onboarding (authentication via username/password)
require_certificate false
use_identity_as_username false

# Enforce TLS 1.2 minimum for security compliance
tls_version tlsv1.2

# ============================================================================
# Logging Configuration
# ============================================================================
# Send logs to stdout for Docker container log aggregation
log_dest stdout
log_type all
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# ============================================================================
# Authentication
# ============================================================================
# Require username/password authentication (stored in passwd file)
# Generate passwd file using: mosquitto_passwd -c passwd <username>
allow_anonymous false
password_file /mosquitto/config/passwd

# ============================================================================
# Message Persistence
# ============================================================================
# Store messages to disk for durability across broker restarts
persistence true
persistence_location /mosquitto/data/

# ============================================================================
# Connection Settings
# ============================================================================
# -1 means unlimited connections (adjust based on expected load)
max_connections -1
# Keep-alive timeout in seconds (client must ping within this interval)
max_keepalive 300

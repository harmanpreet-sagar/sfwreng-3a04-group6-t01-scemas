# Docker Compose configuration for the SCEMAS stack.
# Orchestrates three main services: MQTT broker, backend API, and frontend UI.
#
# Run via start.sh (in the src/ directory) rather than directly — the script
# handles TLS certificate generation, stale volume cleanup, and Docker version
# detection before invoking `docker compose up --build`.
version: '3.8'

services:
  # ── MQTT Message Broker ──────────────────────────────────────────────────────
  # Eclipse Mosquitto provides TLS-secured pub/sub messaging for sensor telemetry.
  # The simulator publishes to port 8883; the backend MQTT subscriber consumes from
  # the same port from within the Docker network (service name: mosquitto).
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mqtt-broker
    ports:
      - "8883:8883"  # TLS-secured MQTT — only this port is exposed to the host
    volumes:
      - ./mosquitto/config:/mosquitto/config  # mosquitto.conf + TLS certs directory
      - mosquitto_data:/mosquitto/data        # Persistent retained message storage
      - mosquitto_logs:/mosquitto/log         # Broker diagnostic logs
    restart: unless-stopped
    networks:
      - app-network

  # ── Backend API ──────────────────────────────────────────────────────────────
  # FastAPI application implementing the API Facade, threshold evaluation,
  # MQTT subscriber background task, and account management.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend-api
    ports:
      - "8000:8000"  # FastAPI HTTP / OpenAPI docs at http://localhost:8000/docs
    environment:
      # Supabase PostgreSQL connection strings — set in src/.env
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_DB_URL=${SUPABASE_DB_URL}
      # Optional public API key seed; defaults to empty (disables the key).
      - DEMO_PUBLIC_API_KEY=${DEMO_PUBLIC_API_KEY:-}
      # JWT_SECRET is required for the login endpoint to issue tokens.
      # Without it, access_token in LoginResponse will be null and all protected
      # endpoints (/threshold, /account) will return 401.
      - JWT_SECRET=${JWT_SECRET}
      # Twilio credentials for SMS alert notifications
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_FROM_NUMBER=${TWILIO_FROM_NUMBER:-}
      - TWILIO_MESSAGING_SERVICE_SID=${TWILIO_MESSAGING_SERVICE_SID:-}
      - TWILIO_TO_NUMBER=${TWILIO_TO_NUMBER}
      # MQTT broker host/port — defaults point at the mosquitto service above.
      # Override these to connect to an external broker if needed.
      - MQTT_BROKER_HOST=${MQTT_BROKER_HOST:-mosquitto}
      - MQTT_BROKER_PORT=${MQTT_BROKER_PORT:-8883}
      # Path inside the backend container where the CA certificate is mounted.
      # The paho-mqtt client uses this to verify the broker's TLS certificate.
      - MQTT_CA_CERT_PATH=/mosquitto/config/certs/ca.crt
    volumes:
      - ./backend:/app  # Mount entire backend directory for hot-reload during development
      # CA cert volume is read-only — the backend only needs to read the cert,
      # never write it. The cert is generated by start.sh before compose up.
      - ./mosquitto/config/certs:/mosquitto/config/certs:ro
    depends_on:
      - mosquitto  # Mosquitto must be up before the MQTT subscriber starts
    restart: unless-stopped
    networks:
      - app-network

  # ── Frontend UI ──────────────────────────────────────────────────────────────
  # React + TypeScript + Vite application serving the Threshold Management UI.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend-app
    ports:
      - "3000:3000"  # Vite dev server — access the UI at http://localhost:3000
    environment:
      # VITE_ prefix is required: Vite strips all other env vars from the browser
      # bundle at build time. VITE_API_URL is the URL the browser uses to reach
      # the backend — must be accessible from the user's machine, not from inside
      # Docker, which is why it points to localhost rather than "backend".
      - VITE_API_URL=http://localhost:8000
      - VITE_MQTT_BROKER_HOST=${MQTT_BROKER_HOST:-mosquitto}
      - VITE_MQTT_BROKER_PORT=${MQTT_BROKER_PORT:-8883}
    volumes:
      # Mount only the src/ directory, not the full frontend directory.
      #
      # Why NOT mount the full directory (./frontend:/app):
      #   Mounting the full directory would shadow the node_modules installed
      #   during `docker build` with whatever is on the host (possibly empty or
      #   out of date). An additional anonymous volume (/app/node_modules) was
      #   previously used to work around this, but anonymous volumes persist
      #   across rebuilds — a stale volume from before tailwindcss was installed
      #   would hide the newly installed package inside the image, causing
      #   "Cannot find module 'tailwindcss'" at Vite startup.
      #
      # Mounting only src/ lets the image's own node_modules (installed during
      # `npm install` in the Dockerfile) remain untouched, while still allowing
      # Vite's HMR (hot module replacement) to pick up source file changes.
      - ./frontend/src:/app/src
    depends_on:
      - backend  # Backend must be up so the initial API calls on load succeed
    restart: unless-stopped
    networks:
      - app-network

# Named volumes for data that must outlive individual container restarts.
# These are NOT removed by `docker compose down`; use `docker compose down -v`
# (or run start.sh, which calls `down -v`) to start completely fresh.
volumes:
  mosquitto_data:  # Retained MQTT messages survive broker restarts
  mosquitto_logs:  # Broker diagnostic logs for debugging

# Bridge network — containers can reach each other by service name (e.g. "mosquitto",
# "backend") without exposing those ports to the host.
networks:
  app-network:
    driver: bridge
